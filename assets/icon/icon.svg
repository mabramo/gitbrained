<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1C1F26"/>

  <!-- Git branch structure -->
  <!-- Main vertical line (trunk) -->
  <line x1="180" y1="130" x2="180" y2="370" stroke="#7C9E87" stroke-width="22" stroke-linecap="round"/>

  <!-- Branch line curving to right -->
  <path d="M 180 200 Q 180 260 290 260" stroke="#7C9E87" stroke-width="22" stroke-linecap="round" fill="none"/>

  <!-- Commit nodes on trunk -->
  <circle cx="180" cy="130" r="22" fill="#7C9E87"/>
  <circle cx="180" cy="130" r="11" fill="#1C1F26"/>

  <circle cx="180" cy="260" r="22" fill="#7C9E87"/>
  <circle cx="180" cy="260" r="11" fill="#1C1F26"/>

  <circle cx="180" cy="370" r="22" fill="#7C9E87"/>
  <circle cx="180" cy="370" r="11" fill="#1C1F26"/>

  <!-- Branch node -->
  <circle cx="290" cy="260" r="22" fill="#7C9E87"/>
  <circle cx="290" cy="260" r="11" fill="#1C1F26"/>

  <!-- Pencil body (angled, top-right area) -->
  <g transform="translate(295, 108) rotate(45)">
    <!-- Pencil shaft -->
    <rect x="-16" y="-90" width="32" height="130" rx="5" fill="#E8C97A"/>
    <!-- Pencil tip -->
    <polygon points="-16,40 16,40 0,78" fill="#D4A843"/>
    <!-- Pencil tip point -->
    <polygon points="-6,68 6,68 0,78" fill="#2C2A28"/>
    <!-- Pencil eraser end -->
    <rect x="-16" y="-104" width="32" height="18" rx="4" fill="#C47B6B"/>
    <!-- Pencil eraser band -->
    <rect x="-16" y="-90" width="32" height="8" fill="#B8956A"/>
    <!-- Pencil highlight -->
    <rect x="-8" y="-88" width="8" height="110" rx="3" fill="#F2D98A" opacity="0.5"/>
  </g>
</svg>
